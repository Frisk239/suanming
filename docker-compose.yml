# docker-compose.yml
# 全量自托管软上线编排（spec 第 3 节）。
# 部署：docker compose build && docker compose up -d
services:
  next-app:
    build:
      context: .
      dockerfile: docker/next-app.Dockerfile
      args:
        # build-time 公开 env（构建时内联进产物）。值来自 build 命令的 --env-file（.env.production）。
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    restart: always
    ports:
      - "3000:3000"
    env_file: .env.production
    depends_on:
      - embed-svc

  embed-svc:
    build:
      context: .
      dockerfile: docker/embed-svc.Dockerfile
    restart: always
    volumes:
      - /root/suanming/models:/models:ro
    # 不映射端口：仅 compose 内网用服务名 http://embed-svc:8765 访问
